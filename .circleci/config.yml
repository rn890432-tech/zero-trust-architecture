version: 2.1

executors:
  python-executor:
    docker:
      - image: cimg/python:3.9
    working_directory: ~/project

  curl-executor:
    docker:
      - image: curlimages/curl:latest
    working_directory: ~/project

jobs:
  lint_code:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install flake8
          command: pip install flake8
      - run:
          name: Run flake8
          command: flake8 .

  security_scan:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install security tools
          command: pip install bandit safety
      - run:
          name: Run bandit security scan
          command: bandit -r . -f json -o bandit-report.json
      - run:
          name: Run safety check
          command: safety check --json > safety-report.json
      - store_artifacts:
          path: bandit-report.json
      - store_artifacts:
          path: safety-report.json

  test_backend:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run pytest
          command: pytest tests/
      - store_test_results:
          path: test-results.xml
      - store_artifacts:
          path: test-results.xml

  send_report:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install boto3
          command: pip install boto3
      - run:
          name: Send report via SES
          command: >
            python -c "import boto3, os;
            ses = boto3.client('ses', region_name=os.getenv('SES_REGION'));
            # ...rest of code..."

  notify_failure:
    executor: curl-executor
    steps:
      - run:
          name: Notify failure on Teams
          command: >
            curl -H 'Content-Type: application/json'
            -d '{\"text\": \"Pipeline $CIRCLE_PROJECT_NAME failed! See details: $CIRCLE_BUILD_URL\"}'
            "$TEAMS_WEBHOOK_URL"

workflows:
  version: 2
  build_and_test:
    jobs:
      - lint_code
      - security_scan
      - test_backend:
          requires:
            - lint_code
      - send_report:
          requires:
            - test_backend
      - notify_failure:
          requires:
            - lint_code
            - security_scan
            - test_backend
