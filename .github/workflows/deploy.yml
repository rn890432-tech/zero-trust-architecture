name: Deploy to Cloud Run
on:
  push:
    branches: [ "main" ]
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
    - run: gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT }}/mission-control
    - run: gcloud run deploy mission-control --image gcr.io/${{ secrets.GCP_PROJECT }}/mission-control --platform managed --region us-central1
