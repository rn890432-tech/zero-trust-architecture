name: CI/CD Dashboard Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install uvicorn fastapi pydantic slowapi pyjwt
      - name: Run backend tests
        run: |
          pytest tests/
      - name: Build Docker image
        run: |
          docker build -t zt-dashboard-api .
      - name: Push Docker image to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Push image
        run: |
          docker tag zt-dashboard-api ${{ secrets.ACR_LOGIN_SERVER }}/zt-dashboard-api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/zt-dashboard-api:latest

  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Azure WebApp Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/zt-dashboard-api:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Upload dashboard to Azure Storage Static Website
        uses: azure/cli@v1
        with:
          inlineScript: |
            az storage blob upload-batch -d '$web' -s . --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --pattern soc_dashboard.html
