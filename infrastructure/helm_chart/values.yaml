# Helm values for resilient messaging platform
replicaCount: 3
image:
  repository: messaging/api-gateway
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: LoadBalancer
  port: 8080
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
kafka:
  enabled: true
  replicaCount: 3
redis:
  enabled: true
  replicaCount: 2
postgres:
  enabled: true
  replicaCount: 1
prometheus:
  enabled: true
  replicaCount: 1
grafana:
  enabled: true
  replicaCount: 1
logAggregator:
  enabled: true
  replicaCount: 1
mailerProvider:
  enabled: true
  replicaCount: 2
worker:
  enabled: true
  replicaCount: 4
