# Kubernetes manifests for new SOC microservices
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-intel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: threat-intel
  template:
    metadata:
      labels:
        app: threat-intel
    spec:
      containers:
      - name: threat-intel
        image: threat-intel:latest
        ports:
        - containerPort: 5001
